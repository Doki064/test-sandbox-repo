# Prevue consumer config — cross-file review demo
# Demonstrates tier-2 gap: PR touches src/api/checkout.py (imports processor.py);
# processor.py is untouched, not in diff — review has no visibility into its
# currency validation constraints.

review:
  incremental: true
  min_severity_to_comment: warning
  min_severity_to_fail: error
  max_inline_comments: 20
  resolve_outdated: true

classification:
  fallback:
    enabled: true
    model: null

engine:
  name: cursor-cli

skip:
  skip_labels:
    - skip-review
  skip_title_patterns:
    - '^\[skip prevue\]'
