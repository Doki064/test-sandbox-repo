# Prevue consumer config — read from default branch at review time.
# See docs/DEMO.md for the live walkthrough.

review:
  max_input_tokens: 120000
  output_reserve_tokens: 12000
  min_severity_to_comment: warning
  min_severity_to_fail: error
  max_inline_comments: 10
  incremental: true
  resolve_outdated: true
  max_known_issues: 20
  max_dismissals: 50

labels:
  data:
    - "**/migrations/**"
    - "**/*.sql"
    - "pipelines/**"
    - "dbt/**"
    - "airflow/**"
  security:
    - "**/auth/**"
    - "**/*secret*"
    - "**/.env*"
    - "config/credentials/**"

skills:
  exclude: []
  max_skill_bytes: 65536
  max_total_consumer_bytes: 262144
  max_consumer_skills: 50

classification:
  fallback:
    enabled: true
    model: null

engine:
  name: copilot-cli

skip:
  review_bots: []
  skip_labels:
    - skip-review
  skip_title_patterns:
    - "^\\[skip prevue\\]"
