# Prevue consumer config — UAT-09 test 14 (budget alert)
# max_total_run_tokens: 2000 forces overflow on 5 large SQL files (~3600 tokens)
# max_tokens_per_call <= max_total_run_tokens — constraint

review:
  max_input_tokens: 120000
  output_reserve_tokens: 400
  min_severity_to_comment: warning
  min_severity_to_fail: error
  max_inline_comments: 10
  incremental: false
  resolve_outdated: true
  max_known_issues: 20
  max_dismissals: 50
  max_tokens_per_call: 2000
  max_total_run_tokens: 2000
  max_review_calls: 1
  review_concurrency: 1

labels:
  data:
    - "**/migrations/**"
    - "**/*.sql"
    - "pipelines/**"
    - "dbt/**"
    - "airflow/**"
  security:
    - "**/auth/**"
    - "**/*secret*"
    - "**/.env*"
    - "config/credentials/**"

skills:
  exclude: []
  max_skill_bytes: 65536
  max_total_consumer_bytes: 262144
  max_consumer_skills: 50

classification:
  fallback:
    enabled: true
    model: null

engine:
  name: cursor-cli

skip:
  review_bots: []
  skip_labels:
    - skip-review
  skip_title_patterns:
    - '^\[skip prevue\]'
